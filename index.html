<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>POEX 证书生成器</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Lora:wght@400;500;600;700&display=swap" rel="stylesheet">
<link rel="icon" type="image/svg+xml" href="assets/icons/lion.svg">
<link rel="stylesheet" href="assets/css/style.css">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar panel">
    <div class="sidebar-header">
      <h2>选择模板</h2>
      <p id="templateCount" class="sidebar-meta">10 个模板</p>
    </div>
    <div id="templateGroups" class="template-groups"></div>
  </aside>

  <main class="main-content">
    <header class="page-header">
      <div class="page-header-copy">
        <h1>POEX 证书生成</h1>
        <p>上传头像，选择模板，调整内容，实时预览后直接导出 PNG。</p>
      </div>
      <div class="page-meta">
        <div class="header-stat">
          <span>当前模板</span>
          <strong id="currentTemplateLabel">POEX 晋级图 中文 01</strong>
        </div>
        <div class="header-stat">
          <span>尺寸</span>
          <strong id="currentTemplateMeta">1536 x 2752</strong>
        </div>
      </div>
    </header>

    <div class="content-wrapper">
      <section class="controls-panel">
        <div class="controls panel">
          <div class="section-header">
            <h3>编辑控制</h3>
            <p>上传图片并调整文字大小。</p>
          </div>

          <section class="control-section">
            <h4>头像设置</h4>
            <label class="field">
              <span>上传头像</span>
              <input type="file" id="avatarUpload" accept="image/*">
            </label>
            <p class="field-tip">也可以直接粘贴图片。</p>
            <div class="button-group">
              <button type="button" class="small-btn" data-scale="-1" data-layer="avatar">缩小头像</button>
              <button type="button" class="small-btn" data-scale="1" data-layer="avatar">放大头像</button>
            </div>
          </section>

          <section class="control-section">
            <h4>姓名设置</h4>
            <label class="field">
              <span>姓名</span>
              <input type="text" id="nameInput" placeholder="输入姓名">
            </label>
            <div class="button-group">
              <button type="button" class="small-btn" data-scale="-1" data-layer="name">缩小姓名</button>
              <button type="button" class="small-btn" data-scale="1" data-layer="name">放大姓名</button>
            </div>
          </section>

          <section class="control-section">
            <h4>UID 设置</h4>
            <label class="field">
              <span>UID</span>
              <input type="text" id="uidInput" placeholder="输入 UID">
            </label>
            <div class="button-group">
              <button type="button" class="small-btn" data-scale="-1" data-layer="uid">缩小 UID</button>
              <button type="button" class="small-btn" data-scale="1" data-layer="uid">放大 UID</button>
            </div>
          </section>

          <div class="panel-note">
            <p>提示：头像、姓名和 UID 都可以直接在预览里拖动调整。</p>
          </div>
        </div>
      </section>

      <section class="preview-panel">
        <div class="preview-container panel">
          <div class="preview-header">
            <div class="preview-title">
              <h3>证书预览</h3>
            </div>

            <div class="preview-buttons">
              <button type="button" class="copy-btn" id="copyBtn">复制图片</button>
              <button type="button" class="download-btn" id="downloadBtn">下载 PNG</button>
            </div>
          </div>

          <div class="canvas-shell">
            <div class="canvas-stage">
              <canvas id="certificateCanvas" width="1536" height="2752"></canvas>

              <div id="loadingOverlay" class="overlay loading-overlay">
                <div class="overlay-card">
                  <div class="spinner"></div>
                  <p>正在加载模板...</p>
                </div>
              </div>

              <div id="errorOverlay" class="overlay error-overlay hidden">
                <div class="overlay-card">
                  <h4>模板加载失败</h4>
                  <p>请刷新页面后重试。</p>
                  <button type="button" class="retry-btn" id="retryBtn">重新加载</button>
                </div>
              </div>
            </div>
          </div>
        </div>
      </section>
    </div>
  </main>
</div>

<script src="assets/js/app.js"></script>
</body>
</html>
